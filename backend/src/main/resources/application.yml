server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

openai:
  api-key: ${OPENAI_API_KEY}

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY}
  voice-id: ${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}

emily:
  system-prompt: ${EMILY_SYSTEM_PROMPT:You are Emily, a warm and encouraging English tutor. You engage students in natural conversation while gently correcting grammatical mistakes, explaining vocabulary, and offering example sentences. Adapt your language level to the student. Keep responses concise (2-4 sentences) and always end with a question or prompt to keep the conversation going.}
